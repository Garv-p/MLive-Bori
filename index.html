<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>
            Ann Arbor Restaurant Bori Cancels all Valentines Day Dinner
            reservations
        </title>
        <meta
            property="og:title"
            content="Ann Arbor Restaurant Bori Cancels all Valentines Day Dinner
        reservations"
        />
        <meta property="og:image" content="bori.jpeg" />
        <meta property="og:type" content="website" />
        <link
            rel="icon"
            type="image/svg+xml"
            href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64"><rect width="64" height="64" rx="12" fill="%23f16a22"/><text x="16" y="46" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="36" fill="white">m</text></svg>'
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                color-scheme: light;
            }
            body {
                margin: 0;
                min-height: 100vh;
                background: pink;
                display: flex;
                flex-direction: column;
                align-items: center;
                font-family: sans-serif;
                color: #333;
            }
            h1 {
                font-family: "Great Vibes", cursive;
                color: red;
                font-size: clamp(2.6rem, 9vw, 5rem);
                letter-spacing: 0.02em;
                margin: 16px 0 10px;
                text-align: center;
                padding: 0 12px;
                line-height: 1.05;
            }
            header {
                position: static;
                top: 0;
                z-index: 10;
                width: 100%;
                display: flex;
                justify-content: center;
                background: pink;
                padding: 10px 0 6px;
            }
            main {
                width: min(960px, 100%);
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 16px;
                padding: 18px 14px 28px;
                box-sizing: border-box;
            }
            .media {
                width: 100%;
                max-width: 520px;
                background: rgba(255, 255, 255, 0.55);
                border-radius: 16px;
                padding: 10px;
                box-sizing: border-box;
            }
            .media img {
                width: 100%;
                max-width: 520px;
                height: auto;
                object-fit: cover;
                border-radius: 14px;
                display: block;
            }
            .caption {
                width: 100%;
                max-width: 520px;
                margin: 0;
                padding: 2px 6px 10px;
                font-size: clamp(1.05rem, 4.6vw, 1.25rem);
                color: #5a1a1a;
                text-align: center;
                font-family: "Great Vibes", cursive;
                line-height: 1.2;
            }
            /* Modal */
            .modal-backdrop {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.45);
                display: grid;
                place-items: center;
                z-index: 999;
                backdrop-filter: blur(3px);
            }
            .modal {
                background: #fff0f6;
                border: 2px solid rgba(255, 0, 102, 0.25);
                border-radius: 18px;
                padding: 22px 24px 18px;
                width: min(90vw, 360px);
                box-shadow: 0 16px 36px rgba(0, 0, 0, 0.16);
                text-align: center;
                font-family: "Great Vibes", cursive;
                color: #b3124f;
            }
            .modal h2 {
                margin: 0 0 6px;
                font-size: clamp(1.9rem, 7vw, 2.4rem);
                line-height: 1.1;
            }
            .modal p {
                margin: 0 0 14px;
                font-size: 1.05rem;
                font-family: sans-serif;
                color: #6b1b36;
            }
            .modal-actions {
                display: flex;
                gap: 10px;
                justify-content: center;
            }
            .modal-actions button {
                padding: 10px 16px;
                font-size: 1rem;
                border-radius: 12px;
                border: none;
                cursor: pointer;
                font-weight: 600;
            }
            .btn-yes {
                background: #ff4f8b;
                color: white;
                box-shadow: 0 6px 14px rgba(255, 0, 102, 0.3);
            }
            .btn-no {
                background: #ffe5f0;
                color: #b3124f;
                border: 2px solid rgba(255, 0, 102, 0.2);
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Happy Valentines Dayyy!!!!!!</h1>
        </header>
        <main>
            <div class="media">
                <img src="cat_headphone.jpg" alt="Top image" />
            </div>
            <p class="caption">Us fr 😄</p>
            <div class="media">
                <img
                    src="https://i.pinimg.com/736x/7e/86/a8/7e86a8a64c57ffc293db563e3845c43c.jpg"
                    alt="Top image"
                />
            </div>
            <p class="caption">From bumming around with each other</p>
            <div class="media">
                <img
                    src="https://i.pinimg.com/736x/4d/2e/15/4d2e1524b15c734a6343f42a74a98286.jpg"
                    alt="Top image"
                />
            </div>
            <p class="caption">To hobby maxxing</p>
            <div class="media">
                <img src="IMG_4432.png" alt="Middle image" />
            </div>
            <p class="caption">Thank you for always being there for moi</p>

            <div class="media">
                <img src="IMG_1225.JPG" alt="Bottom image" />
            </div>
            <p class="caption">The very beginning :)</p>
        </main>

        <div
            class="modal-backdrop"
            id="valentine-modal"
            role="dialog"
            aria-modal="true"
            aria-labelledby="valentine-title"
        >
            <div class="modal">
                <h2 id="valentine-title">
                    Just Kidding!!! Will you be my valentines?
                </h2>
                <div class="modal-actions">
                    <button class="btn-yes" id="btn-yes">Yes</button>
                    <button class="btn-no" id="btn-no">No</button>
                </div>
            </div>
        </div>

        <script>
            const modal = document.getElementById("valentine-modal");
            const closeModal = () => modal?.remove();
            document
                .getElementById("btn-yes")
                ?.addEventListener("click", closeModal);
            document.getElementById("btn-no")?.addEventListener("click", () => {
                window.location.href =
                    "https://youtu.be/eg_TQyJbMb8?si=ov6fo_3vxcCm1FM5&t=7";
            });
        </script>
    </body>
</html>
